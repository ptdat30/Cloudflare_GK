<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chiếc Hộp Bí Mật – Gửi Thông Điệp</title>
    <meta name="description" content="Gửi lời nhắn ẩn danh đến lớp học qua Chiếc Hộp Bí Mật." />

    <!-- Google Fonts: Inter cho typography hiện đại -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Cấu hình Tailwind với màu sắc tùy chỉnh theo design
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ["Inter", "sans-serif"],
            },
            colors: {
              brand: {
                teal: "#0d9488",
                tealLight: "#14b8a6",
                tealDark: "#0f766e",
                bg: "#0f1923",
                surface: "#162231",
                surfaceLight: "#1e3144",
                border: "#1e3a4a",
              },
            },
            animation: {
              "fade-up": "fadeUp 0.4s ease-out forwards",
              "pulse-soft": "pulseSoft 2s ease-in-out infinite",
              "shimmer": "shimmer 1.5s ease-in-out infinite",
            },
            keyframes: {
              fadeUp: {
                "0%": { opacity: "0", transform: "translateY(16px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              pulseSoft: {
                "0%, 100%": { opacity: "1" },
                "50%": { opacity: "0.7" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-200% 0" },
                "100%": { backgroundPosition: "200% 0" },
              },
            },
          },
        },
      };
    </script>

    <style>
      /* ---- CSS tùy chỉnh bổ sung cho Tailwind ---- */
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f1923;
        min-height: 100vh;
        /* Hiệu ứng gradient nền tinh tế */
        background-image:
          radial-gradient(ellipse at 20% 20%, rgba(13, 148, 136, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(6, 78, 89, 0.1) 0%, transparent 50%);
      }

      /* Hiệu ứng glow cho nút gửi */
      .btn-glow {
        box-shadow: 0 0 20px rgba(13, 148, 136, 0.4), 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
      }
      .btn-glow:hover:not(:disabled) {
        box-shadow: 0 0 35px rgba(13, 148, 136, 0.65), 0 6px 20px rgba(0, 0, 0, 0.4);
        transform: translateY(-1px);
      }
      .btn-glow:active:not(:disabled) {
        transform: translateY(0px);
        box-shadow: 0 0 15px rgba(13, 148, 136, 0.35);
      }
      .btn-glow:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Viền phát sáng cho textarea khi focus */
      .textarea-glow:focus {
        outline: none;
        border-color: #0d9488;
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2), 0 0 20px rgba(13, 148, 136, 0.1);
      }

      /* Card container chính với hiệu ứng kính mờ */
      .glass-card {
        background: rgba(22, 34, 49, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(30, 58, 74, 0.8);
      }

      /* Thông báo thành công */
      .success-toast {
        animation: fadeUp 0.4s ease-out forwards;
      }

      /* Counter chữ khi gần đầy */
      .char-warning {
        color: #ef4444;
        animation: pulseSoft 1s ease-in-out infinite;
      }

      /* Scrollbar tùy chỉnh */
      textarea::-webkit-scrollbar {
        width: 4px;
      }
      textarea::-webkit-scrollbar-track {
        background: transparent;
      }
      textarea::-webkit-scrollbar-thumb {
        background: #1e3a4a;
        border-radius: 4px;
      }

      /* Icon hộp thư animation */
      .icon-float {
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      /* Decorative dots background */
      .dot-pattern {
        background-image: radial-gradient(circle, rgba(13,148,136,0.12) 1px, transparent 1px);
        background-size: 24px 24px;
      }
    </style>
  </head>

  <body class="flex items-center justify-center min-h-screen p-4">
    <!-- Decorative background elements -->
    <div class="fixed inset-0 dot-pattern pointer-events-none opacity-40"></div>
    <div class="fixed top-0 left-0 w-64 h-64 rounded-full bg-teal-900/20 blur-3xl pointer-events-none -translate-x-1/2 -translate-y-1/2"></div>
    <div class="fixed bottom-0 right-0 w-80 h-80 rounded-full bg-teal-800/10 blur-3xl pointer-events-none translate-x-1/3 translate-y-1/3"></div>

    <!-- Main Card Container -->
    <div class="glass-card rounded-3xl w-full max-w-sm p-6 relative animate-fade-up" style="animation-delay: 0.1s;">

      <!-- Header: Icon + Tiêu đề -->
      <div class="text-center mb-7">
        <!-- Icon hộp bí mật floating -->
        <div class="icon-float inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
             style="background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%); box-shadow: 0 8px 25px rgba(13,148,136,0.35);">
          <span class="text-3xl" role="img" aria-label="hộp bí mật">📬</span>
        </div>

        <h1 class="text-white text-2xl font-bold tracking-tight leading-tight">
          Gửi Lời Nhắn Đến Lớp 🚀
        </h1>
        <p class="text-slate-400 text-sm mt-1.5 font-light">
          Thông điệp ẩn danh · Hiện lên màn chiếu ngay
        </p>
      </div>

      <!-- Form gửi tin nhắn -->
      <form id="message-form" class="space-y-4" novalidate>

        <!-- Textarea nhập tin nhắn -->
        <div class="relative">
          <textarea
            id="message-input"
            name="content"
            maxlength="200"
            rows="5"
            placeholder="Viết thông điệp ẩn danh của bạn (tối đa 200 ký tự)..."
            class="textarea-glow w-full bg-brand-bg border border-brand-border rounded-2xl px-4 py-3.5 text-white placeholder-slate-500 text-sm resize-none leading-relaxed transition-all duration-300"
            style="background-color: #0a1520;"
            aria-label="Nội dung tin nhắn"
            aria-describedby="char-counter"
          ></textarea>

          <!-- Bộ đếm ký tự hiển thị ở góc dưới textarea -->
          <div class="absolute bottom-3 right-3 flex items-center gap-1.5">
            <span id="char-counter" class="text-xs text-slate-500 font-mono tabular-nums" aria-live="polite">
              0/200
            </span>
          </div>
        </div>

        <!-- Thông báo lỗi (ẩn mặc định) -->
        <div id="error-message"
             class="hidden flex items-center gap-2 bg-red-950/60 border border-red-800/50 rounded-xl px-4 py-3 text-red-400 text-sm"
             role="alert">
          <span>⚠️</span>
          <span id="error-text">Vui lòng nhập nội dung tin nhắn.</span>
        </div>

        <!-- Nút Gửi -->
        <button
          type="submit"
          id="submit-btn"
          class="btn-glow w-full py-4 rounded-2xl text-white font-semibold text-base tracking-wide transition-all duration-300"
          style="background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);"
          aria-label="Gửi tin nhắn"
        >
          <span id="btn-text" class="flex items-center justify-center gap-2">
            Gửi 🚀
          </span>
          <!-- Spinner hiển thị khi đang gửi -->
          <span id="btn-spinner" class="hidden items-center justify-center gap-2">
            <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Đang gửi...
          </span>
        </button>
      </form>

      <!-- Thông báo thành công (ẩn mặc định, hiện sau khi gửi) -->
      <div id="success-toast"
           class="hidden success-toast mt-4 flex flex-col items-center gap-2 bg-teal-950/70 border border-teal-700/60 rounded-2xl px-4 py-4 text-center"
           role="status"
           aria-live="polite">
        <span class="text-2xl">✨</span>
        <p class="text-teal-300 font-medium text-sm leading-snug">
          Gửi thành công! Hãy nhìn lên màn hình máy chiếu nhé ✨
        </p>
        <p class="text-teal-500/70 text-xs">Tin nhắn của bạn đã được hiển thị</p>
      </div>

      <!-- Footer -->
      <div class="mt-6 text-center">
        <p class="text-slate-600 text-xs">
          Cloudflare Pages + KV · Demo Điện Toán Đám Mây
        </p>
      </div>
    </div>

    <!-- ====================================================
         JAVASCRIPT: Xử lý form gửi tin nhắn
         ==================================================== -->
    <script>
      // ---- Lấy các phần tử DOM cần dùng ----
      const form = document.getElementById("message-form");
      const textarea = document.getElementById("message-input");
      const charCounter = document.getElementById("char-counter");
      const submitBtn = document.getElementById("submit-btn");
      const btnText = document.getElementById("btn-text");
      const btnSpinner = document.getElementById("btn-spinner");
      const errorMessage = document.getElementById("error-message");
      const errorText = document.getElementById("error-text");
      const successToast = document.getElementById("success-toast");

      // ---- Cập nhật bộ đếm ký tự theo thời gian thực ----
      textarea.addEventListener("input", () => {
        const currentLength = textarea.value.length;
        const maxLength = 200;

        charCounter.textContent = `${currentLength}/${maxLength}`;

        // Đổi màu đỏ và nhấp nháy khi gần đạt giới hạn (> 180 ký tự)
        if (currentLength > 180) {
          charCounter.classList.add("char-warning");
          charCounter.classList.remove("text-slate-500");
        } else {
          charCounter.classList.remove("char-warning");
          charCounter.classList.add("text-slate-500");
        }

        // Ẩn thông báo lỗi khi người dùng bắt đầu nhập lại
        if (currentLength > 0) {
          hideError();
        }
      });

      // ---- Hàm hiển thị thông báo lỗi ----
      function showError(message) {
        errorText.textContent = message;
        errorMessage.classList.remove("hidden");
        errorMessage.classList.add("flex");
      }

      // ---- Hàm ẩn thông báo lỗi ----
      function hideError() {
        errorMessage.classList.add("hidden");
        errorMessage.classList.remove("flex");
      }

      // ---- Hàm bật trạng thái loading cho nút ----
      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        if (isLoading) {
          btnText.classList.add("hidden");
          btnSpinner.classList.remove("hidden");
          btnSpinner.classList.add("flex");
        } else {
          btnText.classList.remove("hidden");
          btnSpinner.classList.add("hidden");
          btnSpinner.classList.remove("flex");
        }
      }

      // ---- Hàm hiển thị thông báo thành công ----
      function showSuccess() {
        successToast.classList.remove("hidden");
        successToast.classList.add("flex");

        // Tự ẩn thông báo sau 5 giây
        setTimeout(() => {
          successToast.classList.add("hidden");
          successToast.classList.remove("flex");
        }, 5000);
      }

      // ---- Xử lý sự kiện submit form ----
      form.addEventListener("submit", async (event) => {
        // Ngăn form reload trang theo mặc định của HTML
        event.preventDefault();

        // Lấy nội dung tin nhắn và loại bỏ khoảng trắng thừa
        const content = textarea.value.trim();

        // Kiểm tra hợp lệ phía client trước khi gửi lên server
        if (!content) {
          showError("Vui lòng nhập nội dung tin nhắn trước khi gửi.");
          textarea.focus();
          return;
        }

        if (content.length > 200) {
          showError("Tin nhắn không được vượt quá 200 ký tự.");
          return;
        }

        // Bật trạng thái loading
        setLoading(true);
        hideError();

        try {
          // Gửi POST request lên Cloudflare Pages Function
          let response;
          try {
            response = await fetch("/functions/send", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ content: content }),
            });
          } catch (fetchError) {
            // Lỗi mạng thực sự (offline, DNS fail, v.v.)
            console.error("Lỗi fetch:", fetchError);
            showError("Không thể kết nối đến server. Kiểm tra kết nối mạng.");
            return;
          }

          // Thử parse JSON, nếu không được thì hiển thị status code để debug
          let result;
          try {
            result = await response.json();
          } catch (jsonError) {
            console.error("Response không phải JSON. HTTP Status:", response.status);
            showError(`Lỗi server (HTTP ${response.status}). Mở F12 → Console để xem chi tiết.`);
            return;
          }

          if (response.ok && result.success) {
            // Gửi thành công: xóa textarea và hiển thị thông báo
            textarea.value = "";
            charCounter.textContent = "0/200";
            charCounter.classList.remove("char-warning");
            showSuccess();
          } else {
            // Server trả về lỗi có thông báo cụ thể
            showError(result.error || `Gửi thất bại (HTTP ${response.status}). Vui lòng thử lại.`);
          }
        } catch (unexpectedError) {
          console.error("Lỗi không mong đợi:", unexpectedError);
          showError("Lỗi không xác định: " + unexpectedError.message);
        }
 finally {
          // Luôn tắt trạng thái loading dù thành công hay thất bại
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
