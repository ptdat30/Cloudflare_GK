<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chiếc Hộp Bí Mật – Lá Thư Ẩn Danh</title>
    <meta name="description" content="Gửi lời nhắn ẩn danh đến lớp học." />

    <!-- Google Fonts: Lora (Serif) cho cảm giác cổ điển như lá thư -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ["Lora", "serif"],
              sans: ["sans-serif"],
            },
            colors: {
              paper: {
                bg: "#f4f1ea",       /* Nền trang màu be nhẹ */
                card: "#fdfbf7",     /* Màu giấy trắng ngà cho lá thư */
                text: "#2c2c2c",     /* Màu mực đen nhạt / xám đậm */
                muted: "#8c8c8c",
                line: "#e8e4d9",     /* Màu dòng kẻ mờ */
                accent: "#b54a4a",   /* Màu đỏ bã trầu như con dấu sáp (wax seal) */
              }
            }
          }
        }
      };
    </script>

    <style>
      body {
        background-color: #f4f1ea;
        font-family: 'Lora', serif;
        color: #2c2c2c;
      }
      
      /* Lá thư */
      .letter-card {
        background-color: #fcfaf7;
        box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.02);
        position: relative;
        /* Giả lập nếp gấp nhẹ của giấy ở góc */
        border-radius: 2px;
      }
      
      /* Hiệu ứng giấy kẻ ngang giống vở học sinh / giấy thư */
      .lined-paper {
        background-image: repeating-linear-gradient(transparent, transparent 31px, #e8e4d9 31px, #e8e4d9 32px);
        background-attachment: local;
        line-height: 32px;
        padding-top: 6px; /* Canh chỉnh để text khớp với dòng kẻ */
      }
      
      .lined-paper:focus {
        outline: none;
      }

      /* Tùy chỉnh thanh cuộn cho khu vực giấy */
      textarea::-webkit-scrollbar {
        width: 4px;
      }
      textarea::-webkit-scrollbar-track {
        background: transparent;
      }
      textarea::-webkit-scrollbar-thumb {
        background: #d6d3cc;
        border-radius: 4px;
      }
      
      /* Nút gửi phong cách con dấu tem thư */
      .stamp-btn {
        background-color: #b54a4a;
        color: #fcfaf7;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 600;
        font-family: sans-serif;
        border-radius: 3px;
        transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 6px rgba(181, 74, 74, 0.2);
      }
      .stamp-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        background-color: #a03c3c;
        box-shadow: 0 6px 12px rgba(181, 74, 74, 0.3);
      }
      .stamp-btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 2px 4px rgba(181, 74, 74, 0.2);
      }
      .stamp-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        box-shadow: none;
      }

      .char-warning {
        color: #b54a4a;
        font-weight: bold;
      }

      /* Animation xuất hiện mượt mà */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fadeUp 0.6s ease-out forwards;
      }
    </style>
  </head>

  <body class="flex items-center justify-center min-h-screen p-4 sm:p-8">
    
    <!-- Lá thư chính -->
    <div class="letter-card w-full max-w-md p-8 sm:p-10 mx-auto animate-fade-up border border-paper-line/50">
      
      <!-- Header lá thư -->
      <div class="mb-8 text-center">
        <h1 class="text-2xl font-semibold text-paper-text mb-3 tracking-wide">Lá Thư Ẩn Danh</h1>
        <div class="h-[1px] w-12 bg-paper-accent mx-auto opacity-40"></div>
      </div>

      <!-- Form nhập nội dung -->
      <form id="message-form" class="space-y-6" novalidate>
        
        <div class="relative">
          <textarea
            id="message-input"
            name="content"
            maxlength="200"
            rows="6"
            placeholder="Viết vài dòng tâm sự gửi đến lớp..."
            class="lined-paper w-full bg-transparent border-none text-paper-text placeholder-paper-muted/60 text-lg resize-none"
            aria-label="Nội dung thư"
          ></textarea>
          
          <div class="absolute -bottom-6 right-0">
             <span id="char-counter" class="text-xs text-paper-muted font-sans tracking-widest">0/200</span>
          </div>
        </div>

        <!-- Thông báo lỗi -->
        <div id="error-message" class="hidden pt-2" role="alert">
          <p id="error-text" class="text-paper-accent text-sm text-center italic font-medium">Vui lòng nhập nội dung.</p>
        </div>

        <!-- Nút Gửi (Tem) -->
        <div class="pt-8 flex justify-center">
          <button
            type="submit"
            id="submit-btn"
            class="stamp-btn px-8 py-3 text-xs sm:text-sm flex items-center justify-center gap-2 w-full sm:w-auto"
          >
            <span id="btn-text">Gửi Đi 🕊️</span>
            <span id="btn-spinner" class="hidden items-center justify-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Đang dán tem...
            </span>
          </button>
        </div>
      </form>
      
      <!-- Thông báo thành công -->
      <div id="success-toast" class="hidden mt-8 text-center p-4 border border-paper-line bg-paper-bg/30" role="status">
        <p class="text-paper-text font-medium italic">"Lá thư của bạn đã được gửi bay đi..." ✨</p>
      </div>

    </div>

    <!-- ====================================================
         JAVASCRIPT: Xử lý form gửi tin nhắn
         ==================================================== -->
    <script>
      const form = document.getElementById("message-form");
      const textarea = document.getElementById("message-input");
      const charCounter = document.getElementById("char-counter");
      const submitBtn = document.getElementById("submit-btn");
      const btnText = document.getElementById("btn-text");
      const btnSpinner = document.getElementById("btn-spinner");
      const errorMessage = document.getElementById("error-message");
      const errorText = document.getElementById("error-text");
      const successToast = document.getElementById("success-toast");

      // Cập nhật bộ đếm ký tự
      textarea.addEventListener("input", () => {
        const currentLength = textarea.value.length;
        charCounter.textContent = `${currentLength}/200`;

        if (currentLength > 180) {
          charCounter.classList.add("char-warning");
          charCounter.classList.remove("text-paper-muted");
        } else {
          charCounter.classList.remove("char-warning");
          charCounter.classList.add("text-paper-muted");
        }

        if (currentLength > 0) hideError();
      });

      function showError(message) {
        errorText.textContent = message;
        errorMessage.classList.remove("hidden");
        errorMessage.classList.add("block");
      }

      function hideError() {
        errorMessage.classList.add("hidden");
        errorMessage.classList.remove("block");
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        if (isLoading) {
          btnText.classList.add("hidden");
          btnSpinner.classList.remove("hidden");
          btnSpinner.classList.add("flex");
        } else {
          btnText.classList.remove("hidden");
          btnSpinner.classList.add("hidden");
          btnSpinner.classList.remove("flex");
        }
      }

      function showSuccess() {
        successToast.classList.remove("hidden");
        successToast.classList.add("block");
        setTimeout(() => {
          successToast.classList.add("hidden");
          successToast.classList.remove("block");
        }, 5000);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const content = textarea.value.trim();

        if (!content) {
          showError("Bạn quên viết thư rồi.");
          textarea.focus();
          return;
        }

        if (content.length > 200) {
          showError("Thư dài quá (tối đa 200 ký tự).");
          return;
        }

        setLoading(true);
        hideError();

        try {
          let response;
          try {
            response = await fetch("/functions/send", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content }),
            });
          } catch (fetchError) {
            showError("Lỗi kết nối. Không thể gửi thư.");
            return;
          }

          let result;
          try {
            result = await response.json();
          } catch (jsonError) {
            showError(`Lỗi hệ thống (HTTP ${response.status}).`);
            return;
          }

          if (response.ok && result.success) {
            textarea.value = "";
            charCounter.textContent = "0/200";
            charCounter.classList.remove("char-warning");
            showSuccess();
          } else {
            showError(result.error || "Gửi thư thất bại, thử lại nhé.");
          }
        } catch (unexpectedError) {
          showError("Lỗi không xác định: " + unexpectedError.message);
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
