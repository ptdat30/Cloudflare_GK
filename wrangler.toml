# Cloudflare Pages – Cấu hình dành cho Pages project
#
# Lưu ý:
#   - KV binding "MESSAGES_KV" được cấu hình trong Dashboard:
#     Pages → cloudflare-gk-pages → Settings → Bindings → KV namespace bindings
#   - Để test LOCAL: npx wrangler pages dev . --kv MESSAGES_KV

name = "cloudflare-gk-pages"
compatibility_date = "2024-01-01"

# Thư mục chứa static assets để Cloudflare Pages deploy
pages_build_output_dir = "."

# !! KV namespace binding được cấu hình qua Cloudflare Dashboard, KHÔNG cần ở đây khi deploy
# Uncomment dòng dưới CHỈ KHI test local với wrangler pages dev:
# [[kv_namespaces]]
# binding = "MESSAGES_KV"
# id = "YOUR_LOCAL_KV_ID"
