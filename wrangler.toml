# Cloudflare Pages – Cấu hình dành cho Pages project (KHÔNG phải Workers)
#
# Lưu ý quan trọng:
#   - "pages_build_output_dir" báo cho Cloudflare biết đây là Pages project
#   - KV binding thật được cấu hình trong Dashboard: Pages → Settings → Functions → KV namespace bindings
#   - Để test LOCAL: npx wrangler pages dev . --kv MESSAGES_KV

name = "cloudfaregk"
compatibility_date = "2024-01-01"

# Thư mục chứa static assets (index.html, dashboard.html) để Cloudflare Pages deploy
pages_build_output_dir = "."

# KV binding dùng khi test LOCAL với wrangler pages dev
# Khi deploy lên Pages thật, binding được cấu hình qua Cloudflare Dashboard
[[kv_namespaces]]
binding = "MESSAGES_KV"
id = "20d13b40d2324751807f7433dd6090d7"
